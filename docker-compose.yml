services:
  postgres:
    image: postgres:16-alpine
    container_name: clipify-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bun_template
    ports:
      - "${CLIPIFY_POSTGRES_PORT:-5432}:5432"
    volumes:
      - clipify-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bun_template"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  clipify-postgres-data:
