name: Deploy API (Production)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "scripts/prepare-railway-api-deploy.sh"
      - "scripts/smoke-api.sh"
      - ".github/workflows/deploy-api-prod.yml"

concurrency:
  group: deploy-api-production
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
      RAILWAY_ENVIRONMENT_NAME: ${{ vars.RAILWAY_ENVIRONMENT_NAME }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate deploy configuration
        run: |
          : "${RAILWAY_TOKEN:?Missing RAILWAY_TOKEN secret}"
          : "${RAILWAY_PROJECT_ID:?Missing RAILWAY_PROJECT_ID variable}"
          : "${RAILWAY_SERVICE_NAME:?Missing RAILWAY_SERVICE_NAME variable}"
          : "${RAILWAY_ENVIRONMENT_NAME:?Missing RAILWAY_ENVIRONMENT_NAME variable}"
          : "${MIGRATION_DATABASE_URL:?Missing MIGRATION_DATABASE_URL secret}"
          : "${API_BASE_URL:?Missing API_BASE_URL variable}"

      - name: Run production migrations
        run: DATABASE_URL="$MIGRATION_DATABASE_URL" bun run --cwd apps/api db:migrate

      - name: Prepare deploy context
        run: bash scripts/prepare-railway-api-deploy.sh

      - name: Deploy production API service
        run: >
          railway up .railway-api-deploy
          --path-as-root
          --project "$RAILWAY_PROJECT_ID"
          --environment "$RAILWAY_ENVIRONMENT_NAME"
          --service "$RAILWAY_SERVICE_NAME"
          --ci

      - name: Smoke check production API
        run: bash scripts/smoke-api.sh "$API_BASE_URL"
