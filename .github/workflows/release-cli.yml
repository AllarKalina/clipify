name: Release CLI

on:
  push:
    tags:
      - "clipify-cli-v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        run: bun run --cwd apps/cli build:binary

      - name: Package binary
        run: |
          mkdir -p artifacts
          tar -czf artifacts/clipify-darwin-arm64.tar.gz -C apps/cli/dist clipify

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipify-darwin-arm64
          path: artifacts/clipify-darwin-arm64.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: clipify-darwin-arm64
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/clipify-darwin-arm64.tar.gz
