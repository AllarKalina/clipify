name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify API Docker build
        run: docker build -f apps/api/Dockerfile -t clipify-api-ci .

      - name: Build CLI binary
        run: bun run build:cli

      - name: Verify CLI artifact
        run: test -x apps/cli/dist/clipify

  smoke-api:
    runs-on: ubuntu-latest
    needs: validate
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: clipify_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d clipify_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      APP_NAME: clipify-api
      API_VERSION: v1
      MIN_CLI_VERSION: 0.1.0
      LATEST_CLI_VERSION: 0.1.0
      HOST: 127.0.0.1
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/clipify_ci
      BETTER_AUTH_SECRET: test-secret-with-16-characters
      BETTER_AUTH_URL: http://localhost:3000
      SPOTIFY_CLIENT_ID: test-client-id
      SPOTIFY_CLIENT_SECRET: test-client-secret
      SPOTIFY_REDIRECT_URI: http://127.0.0.1:3000/v1/cli/auth/callback/public
      SPOTIFY_TOKEN_ENCRYPTION_KEY: test-token-encryption-key
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: clipify-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_EXPORTER_OTLP_HEADERS: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run --cwd apps/api db:migrate

      - name: Start API
        run: |
          bun run --cwd apps/api start > /tmp/clipify-api.log 2>&1 &
          echo $! > /tmp/clipify-api.pid

      - name: Wait for API
        run: |
          for _ in {1..30}; do
            if curl -fsS http://localhost:3000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat /tmp/clipify-api.log
          exit 1

      - name: Run API smoke checks
        run: bash scripts/smoke-api.sh http://localhost:3000

      - name: Print API logs on failure
        if: failure()
        run: cat /tmp/clipify-api.log

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/clipify-api.pid ]; then
            kill "$(cat /tmp/clipify-api.pid)" || true
          fi
